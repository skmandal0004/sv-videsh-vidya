<svg viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" width="420" height="300">
  <defs>
    <radialGradient id="gglobe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="gsea" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>

  <!-- Glow ring -->
  <ellipse cx="185" cy="175" rx="130" ry="130" fill="url(#gsea)" opacity="0.18"/>

  <!-- Globe body -->
  <ellipse cx="185" cy="178" rx="118" ry="118" fill="url(#gglobe)" opacity="0.9"/>
  <ellipse cx="185" cy="178" rx="118" ry="118" fill="none" stroke="#a78bfa" stroke-width="2"/>

  <!-- Longitude / latitude lines -->
  <ellipse cx="185" cy="178" rx="60" ry="118" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="67" y1="178" x2="303" y2="178" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="75" y1="145" x2="295" y2="145" stroke="#c4b5fd" stroke-width="1" opacity="0.35"/>
  <line x1="75" y1="211" x2="295" y2="211" stroke="#c4b5fd" stroke-width="1" opacity="0.35"/>
  <line x1="92" y1="120" x2="278" y2="120" stroke="#c4b5fd" stroke-width="1" opacity="0.2"/>
  <line x1="92" y1="236" x2="278" y2="236" stroke="#c4b5fd" stroke-width="1" opacity="0.2"/>

  <!-- Continents (white blobs) -->
  <ellipse cx="140" cy="155" rx="20" ry="10" fill="white" opacity="0.25" transform="rotate(-20,140,155)"/>
  <ellipse cx="210" cy="195" rx="25" ry="12" fill="white" opacity="0.25" transform="rotate(15,210,195)"/>
  <ellipse cx="170" cy="200" rx="14" ry="7" fill="white" opacity="0.2" transform="rotate(-10,170,200)"/>
  <ellipse cx="220" cy="150" rx="18" ry="8" fill="white" opacity="0.18" transform="rotate(25,220,150)"/>
  <ellipse cx="155" cy="130" rx="12" ry="6" fill="white" opacity="0.18" transform="rotate(-15,155,130)"/>
  <ellipse cx="190" cy="160" rx="10" ry="5" fill="white" opacity="0.15" transform="rotate(5,190,160)"/>

  <!-- Center pin -->
  <circle cx="185" cy="178" r="4" fill="#FFD600"/>
  <circle cx="185" cy="178" r="9" fill="none" stroke="#FFD600" stroke-width="1.5" opacity="0.5"/>

  <!-- Pin: Germany -->
  <circle cx="130" cy="140" r="4" fill="#4ade80"/>
  <rect x="96" y="118" width="68" height="19" rx="9" fill="#1a152d" opacity="0.88"/>
  <text x="130" y="131.5" text-anchor="middle" fill="white" font-size="9" font-family="DM Sans,sans-serif" font-weight="600">🇩🇪 Germany</text>

  <!-- Pin: USA -->
  <circle cx="245" cy="150" r="4" fill="#f472b6"/>
  <rect x="219" y="128" width="52" height="19" rx="9" fill="#1a152d" opacity="0.88"/>
  <text x="245" y="141.5" text-anchor="middle" fill="white" font-size="9" font-family="DM Sans,sans-serif" font-weight="600">🇺🇸 USA</text>

  <!-- Pin: Australia -->
  <circle cx="150" cy="210" r="4" fill="#fb923c"/>
  <rect x="116" y="218" width="68" height="19" rx="9" fill="#1a152d" opacity="0.88"/>
  <text x="150" y="231.5" text-anchor="middle" fill="white" font-size="9" font-family="DM Sans,sans-serif" font-weight="600">🇦🇺 Australia</text>

  <!-- Pin: Canada -->
  <circle cx="228" cy="205" r="4" fill="#60a5fa"/>
  <rect x="198" y="213" width="60" height="19" rx="9" fill="#1a152d" opacity="0.88"/>
  <text x="228" y="226.5" text-anchor="middle" fill="white" font-size="9" font-family="DM Sans,sans-serif" font-weight="600">🇨🇦 Canada</text>

  <!-- Card: Admission Open -->
  <rect x="290" y="55" width="118" height="56" rx="13" fill="white" opacity="0.96"/>
  <circle cx="310" cy="70" r="9" fill="#EDE9FF"/>
  <text x="310" y="74" text-anchor="middle" font-size="11">🎓</text>
  <text x="324" y="67" font-size="8.5" font-family="DM Sans,sans-serif" font-weight="700" fill="#1A152D">Admission Open</text>
  <text x="324" y="78" font-size="7.5" font-family="DM Sans,sans-serif" fill="#888">2025 Intake</text>
  <rect x="298" y="88" width="100" height="10" rx="5" fill="#EDE9FF"/>
  <rect x="298" y="88" width="70" height="10" rx="5" fill="#6B4EFF"/>
  <text x="333" y="96.5" text-anchor="middle" font-size="7" font-family="DM Sans,sans-serif" fill="white" font-weight="600">70% Filled</text>

  <!-- Card: Top Ranked -->
  <rect x="8" y="48" width="104" height="48" rx="13" fill="white" opacity="0.96"/>
  <circle cx="24" cy="63" r="8" fill="#fef9c3"/>
  <text x="24" y="67" text-anchor="middle" font-size="10">⭐</text>
  <text x="37" y="60" font-size="8.5" font-family="DM Sans,sans-serif" font-weight="700" fill="#1A152D">Top Ranked</text>
  <text x="37" y="71" font-size="7.5" font-family="DM Sans,sans-serif" fill="#888">Universities</text>
  <text x="16" y="87" font-size="7.5" font-family="DM Sans,sans-serif" fill="#6B4EFF" font-weight="600">QS Ranked 500+</text>

  <!-- Card: Visa Success -->
  <rect x="10" y="248" width="112" height="42" rx="13" fill="white" opacity="0.96"/>
  <circle cx="28" cy="269" r="9" fill="#dcfce7"/>
  <text x="28" y="273.5" text-anchor="middle" font-size="11" fill="#15803d">✓</text>
  <text x="43" y="264" font-size="8.5" font-family="DM Sans,sans-serif" font-weight="700" fill="#1A152D">Visa Success</text>
  <text x="43" y="275" font-size="7.5" font-family="DM Sans,sans-serif" fill="#888">Rate: 98.6%</text>

  <!-- Card: Scholarships -->
  <rect x="298" y="248" width="112" height="42" rx="13" fill="white" opacity="0.96"/>
  <circle cx="316" cy="269" r="9" fill="#fce7f3"/>
  <text x="316" y="273.5" text-anchor="middle" font-size="11">🎓</text>
  <text x="331" y="264" font-size="8.5" font-family="DM Sans,sans-serif" font-weight="700" fill="#1A152D">Scholarships</text>
  <text x="331" y="275" font-size="7.5" font-family="DM Sans,sans-serif" fill="#888">Up to 100%</text>
</svg>
